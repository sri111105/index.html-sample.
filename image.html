<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Gallery</title>

    <style>

        /* Image Styling Class */
        .eventImage {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 15px;
            text-align: center;
        }

    </style>
</head>

<body>

    <h1>Community Event Gallery</h1>

    <table border="1">

        <!-- Row 1 -->
        <tr>

            <td>
                <img src="event1.jpg"
                     alt="Music Event"
                     title="Music Festival"
                     class="eventImage">

                <p>Music Festival 2026</p>
            </td>

            <td>
                <img src="event2.jpg"
                     alt="Food Event"
                     title="Food Carnival"
                     class="eventImage">

                <p>Food Carnival Event</p>
            </td>

            <td>
                <img src="event3.jpg"
                     alt="Sports Event"
                     title="Sports Day"
                     class="eventImage">

                <p>Annual Sports Day</p>
            </td>

        </tr>

        <!-- Row 2 -->
        <tr>

            <td>
                <img src="event4.jpg"
                     alt="Dance Event"
                     title="Dance Program"
                     class="eventImage">

                <p>Dance Celebration</p>
            </td>

            <td>
                <img src="event5.jpg"
                     alt="Art Event"
                     title="Art Exhibition"
                     class="eventImage">

                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="event6.jpg"
                     alt="Community Meeting"
                     title="Community Meetup"
                     class="eventImage">

                <p>Community Meetup</p>
            </td>

        </tr>

    </table>

</body>

</html>
